name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_WORKER_REPO: tia-worker
  ECS_CLUSTER: tia-cluster
  ECS_WORKER_SERVICE: tia-worker-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      ################################
      # Build + Upload Windows API Artifact
      ################################

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Windows API (self-contained, single exe)
        run: |
          dotnet publish ./api-service/api-service.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish/api-service

      - name: Zip Windows API artifact
        run: |
          cd ./publish/api-service
          zip -r ../windows-service.zip .

      - name: Upload Windows API artifact to S3
        run: |
          aws s3 cp ./publish/windows-service.zip \
            s3://${{ secrets.ARTIFACTS_BUCKET }}/windows-service/windows-service.zip

      - name: Refresh Windows API artifact on EC2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=tia-windows-api" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "Deploying to instance: $INSTANCE_ID"

          # Wait for SSM agent to be ready (up to 5 minutes)
          echo "Waiting for SSM agent to be ready..."
          for i in {1..30}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text \
              --region ${{ env.AWS_REGION }} 2>/dev/null || echo "NotReady")
            echo "Attempt $i/30 - SSM status: $STATUS"
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is ready"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "SSM agent did not become ready in time"
              exit 1
            fi
            sleep 10
          done

          # Use Python to write the JSON to avoid shell escaping issues
          python3 - << PYEOF
          import json
          bucket = "${{ secrets.ARTIFACTS_BUCKET }}"
          instance_id = "$INSTANCE_ID"
          payload = {
            "InstanceIds": [instance_id],
            "DocumentName": "AWS-RunPowerShellScript",
            "Parameters": {
              "commands": [
                "cmd /c sc stop TiaWindowsApi",
                "Start-Sleep -Seconds 3",
                "cmd /c sc delete TiaWindowsApi",
                "Start-Sleep -Seconds 3",
                f'& "C:\\Program Files\\Amazon\\AWSCLIV2\\aws.exe" s3 cp s3://{bucket}/windows-service/windows-service.zip C:\\app\\windows-service.zip',
                "Expand-Archive -Path C:\\app\\windows-service.zip -DestinationPath C:\\app -Force",
                "cmd /c sc create TiaWindowsApi binPath= C:\\app\\api-service.exe start= auto",
                "netsh advfirewall firewall add rule name=AllowHTTP80 dir=in action=allow protocol=TCP localport=80",
                "cmd /c sc start TiaWindowsApi",
                "Start-Sleep -Seconds 5",
                "cmd /c sc query TiaWindowsApi"
              ]
            }
          }
          with open("/tmp/ssm-command.json", "w") as f:
            json.dump(payload, f)
          print("JSON written successfully")
          PYEOF

          cat /tmp/ssm-command.json

          aws ssm send-command \
            --cli-input-json file:///tmp/ssm-command.json \
            --region ${{ env.AWS_REGION }}

      ################################
      # Build + Push Worker
      ################################

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Worker image
        run: docker build -t $ECR_WORKER_REPO ./worker-service

      - name: Tag Worker image
        run: |
          docker tag $ECR_WORKER_REPO:latest \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_WORKER_REPO:latest

      - name: Push Worker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_WORKER_REPO:latest

      ################################
      # Deploy Worker
      ################################

      - name: Deploy Worker service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_WORKER_SERVICE \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}