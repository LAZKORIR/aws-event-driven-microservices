name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_WORKER_REPO: tia-worker
  ECS_CLUSTER: tia-cluster
  ECS_WORKER_SERVICE: tia-worker-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      ################################
      # Build + Upload Windows API Artifact
      ################################

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Windows API (self-contained, single exe)
        run: |
          dotnet publish ./api-service/api-service.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish/api-service

      - name: Zip Windows API artifact
        run: |
          cd ./publish/api-service
          zip -r ../windows-service.zip .

      - name: Upload Windows API artifact to S3
        run: |
          aws s3 cp ./publish/windows-service.zip \
            s3://${{ secrets.ARTIFACTS_BUCKET }}/windows-service/windows-service.zip

      - name: Refresh Windows API artifact on EC2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=tia-windows-api" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "Deploying to instance: $INSTANCE_ID"

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunPowerShellScript" \
            --cli-input-json "{\"InstanceIds\":[\"$INSTANCE_ID\"],\"DocumentName\":\"AWS-RunPowerShellScript\",\"Parameters\":{\"commands\":[\"\\\"C:\\\\Program Files\\\\Amazon\\\\AWSCLIV2\\\\aws.exe\\\" s3 cp s3://${{ secrets.ARTIFACTS_BUCKET }}/windows-service/windows-service.zip C:\\\\app\\\\windows-service.zip\",\"cmd /c sc stop TiaWindowsApi\",\"Start-Sleep -Seconds 3\",\"cmd /c sc delete TiaWindowsApi\",\"Start-Sleep -Seconds 3\",\"Expand-Archive -Path C:\\\\app\\\\windows-service.zip -DestinationPath C:\\\\app -Force\",\"cmd /c sc create TiaWindowsApi binPath= C:\\\\app\\\\api-service.exe start= auto\",\"netsh advfirewall firewall add rule name=\\\"Allow HTTP 80\\\" dir=in action=allow protocol=TCP localport=80\",\"cmd /c sc start TiaWindowsApi\"]}}" \
            --region ${{ env.AWS_REGION }}

      ################################
      # Build + Push Worker
      ################################

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Worker image
        run: docker build -t $ECR_WORKER_REPO ./worker-service

      - name: Tag Worker image
        run: |
          docker tag $ECR_WORKER_REPO:latest \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_WORKER_REPO:latest

      - name: Push Worker image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_WORKER_REPO:latest

      ################################
      # Deploy Worker
      ################################

      - name: Deploy Worker service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_WORKER_SERVICE \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}